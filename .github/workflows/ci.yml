name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      # Linting
      - name: Run ESLint
        run: bun run lint

      # Type checking
      - name: Check TypeScript
        run: bun run type-check

      # Formatting
      - name: Check formatting
        run: bun run format:check

      # Build check
      - name: Build Next.js
        run: bun run build

      # Security
      - name: Check for vulnerabilities
        run: bun audit

  # Optional: Test coverage (add later)
